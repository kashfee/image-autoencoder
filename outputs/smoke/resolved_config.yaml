seed: 7
model:
  latent_channels: 16
  base_channels: 16
  norm: group
  dropout: 0.0
  bit_depth: 6
  quant_clip: 2.0
  soft_round_alpha: 8.0
  importance_temperature: 0.08
data:
  image_size: 256
  train_dir: data/smoke/train
  val_dir: data/smoke/val
  val_split: 0.1
  batch_size: 2
  num_workers: 0
  augment: false
training:
  epochs: 1
  learning_rate: 0.0001
  weight_decay: 1.0e-06
  grad_clip_norm: 1.0
  amp: false
  output_dir: outputs/smoke
  save_every: 1
loss:
  mse_weight: 1.0
  ssim_weight: 0.05
  ms_ssim_weight: 0.05
  rd_lambda: 0.001
