version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: image_compression_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - compression_network

  # Optional: MongoDB Express for GUI access
  mongo-express:
    image: mongo-express:1.0
    container_name: image_compression_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpassword
      ME_CONFIG_MONGODB_URL: mongodb://root:rootpassword@mongo:27017/
    depends_on:
      - mongo
    networks:
      - compression_network

volumes:
  mongo_data:
  mongo_config:

networks:
  compression_network:
    driver: bridge
