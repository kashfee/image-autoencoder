seed: 7

model:
  latent_channels: 16
  base_channels: 16
  dropout: 0.0
  bit_depth: 6

data:
  train_dir: data/smoke/train
  val_dir: data/smoke/val
  image_size: 256
  batch_size: 2
  num_workers: 0
  augment: false

training:
  epochs: 1
  learning_rate: 0.0001
  weight_decay: 0.000001
  grad_clip_norm: 1.0
  amp: false
  output_dir: outputs/smoke
  save_every: 1

loss:
  mse_weight: 1.0
  ssim_weight: 0.05
  ms_ssim_weight: 0.05
  rd_lambda: 0.001
